name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"
  ONNX_RUNTIME_VERSION: "1.24.4"
  ESPEAK_NG_VERSION: "1.52"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  dist:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: portable_kittentts_cpp
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare assets
        run: .\scripts\prepare-release-assets.ps1 -Models all -ZigVersion $env:ZIG_VERSION -OnnxRuntimeVersion $env:ONNX_RUNTIME_VERSION -EspeakNgVersion $env:ESPEAK_NG_VERSION

      - name: Build dist
        run: .\build.ps1

      - name: Package dist
        run: .\scripts\package-release.ps1 -Kind dist -Tag $env:RELEASE_TAG -OutputDir release

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: portable_kittentts_cpp\release\artifacts\*

  single-exe:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - nano
          - nano-int8
          - micro
          - mini
    defaults:
      run:
        shell: pwsh
        working-directory: portable_kittentts_cpp
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare assets
        run: .\scripts\prepare-release-assets.ps1 -Models ${{ matrix.model }} -ZigVersion $env:ZIG_VERSION -OnnxRuntimeVersion $env:ONNX_RUNTIME_VERSION -EspeakNgVersion $env:ESPEAK_NG_VERSION

      - name: Build dist
        run: .\build.ps1

      - name: Package single-exe
        run: .\scripts\package-release.ps1 -Kind sfx -Model ${{ matrix.model }} -Tag $env:RELEASE_TAG -OutputDir release

      - name: Upload single-exe artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.model }}
          path: portable_kittentts_cpp\release\artifacts\*

  publish:
    needs:
      - dist
      - single-exe
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release-assets/**/*
